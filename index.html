  <script type="text/javascript">
    // Single Page Apps for GitHub Pages Fix
    // Handles /FamilyHub/install and /FamilyHub/app routing
    // This reverses the redirect done by 404.html
    (function (l) {
      var base = '/FamilyHub/';
      // Check if we came from the 404.html redirect (search starts with '/')
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        // Remove leading slash from decoded path to avoid double slashes
        var cleanPath = decoded.replace(/^\//, '');
        window.history.replaceState(null, null,
          base + cleanPath + l.hash
        );
      }
    }(window.location))
  </script>

  <style>
    /* Global Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Liquid Glass Refinements */
    .liquid-shimmer-card {
      position: relative;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(25px) saturate(200%);
      -webkit-backdrop-filter: blur(25px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 40px;
      overflow: hidden;
    }

    .dark .liquid-shimmer-card {
      background: rgba(15, 23, 42, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Nav Wobble Bubble */
    .nav-wobble-bubble {
      position: absolute;
      height: 55%;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.22), rgba(37, 99, 235, 0.12));
      border-radius: 20px;
      z-index: 0;
      pointer-events: none;
      will-change: left, width, transform;
      transition: width 0.3s ease, left 0.35s ease, transform 0.15s ease;
    }

    .dark .nav-wobble-bubble {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.28), rgba(139, 92, 246, 0.16));
    }


    /* Legibility Helpers */

    /* Disable selection globally for app-like feel */
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none;
    }

    /* Re-enable selection for inputs */
    input,
    textarea,
    [contenteditable="true"] {
      -webkit-user-select: text;
      user-select: text;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
      transition: background-color 0.5s ease, color 0.5s ease;
      padding-bottom: 0;
    }

    #root {
      min-height: 100vh;
    }

    header.sticky {
      top: 0;
    }

    nav.fixed.bottom-0 {
      padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
    }

    .dark body {
      background-color: #111827;
      color: #f3f4f6;
    }

    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #475569;
    }

    .page-transition-wrapper {
      animation: slideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
      width: 100%;
      will-change: transform, opacity;
    }
