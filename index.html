<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f3f4f6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <title>FamilyHub</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              dark: {
                bg: '#111827',
                card: '#1f2937',
                text: '#f3f4f6',
                muted: '#9ca3af'
              }
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'slide-in': 'slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up': 'slideUp 0.3s ease-out forwards',
              'fade-in': 'fadeIn 0.4s ease-out forwards',
              'gradient-x': 'gradientX 20s ease infinite',
              'blob': 'blob 7s infinite',
              'rain': 'fall linear infinite',
              'cloud': 'drift ease-in-out infinite alternate',
              'thunder': 'flash 5s infinite',
              'wobble': 'liquidWobble 0.25s ease-in-out infinite'
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              slideIn: {
                '0%': { opacity: '0', transform: 'translateY(10px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              gradientX: {
                '0%': { 'background-position': '0% 50%' },
                '50%': { 'background-position': '100% 50%' },
                '100%': { 'background-position': '0% 50%' },
              },
              blob: {
                '0%': { transform: 'translate3d(0px, 0px, 0) scale(1)' },
                '33%': { transform: 'translate3d(30px, -50px, 0) scale(1.1)' },
                '66%': { transform: 'translate3d(-20px, 20px, 0) scale(0.9)' },
                '100%': { transform: 'translate3d(0px, 0px, 0) scale(1)' },
              },
              fall: {
                '0%': { transform: 'translate3d(0, -10vh, 0) translateX(0)', opacity: '0' },
                '10%': { opacity: '1' },
                '90%': { opacity: '1' },
                '100%': { transform: 'translate3d(10px, 110vh, 0)', opacity: '0' }
              },
              drift: {
                '0%': { transform: 'translate3d(-5%, 0, 0)' },
                '50%': { transform: 'translate3d(5%, 0, 0)' },
                '100%': { transform: 'translate3d(-5%, 0, 0)' }
              },
              flash: {
                '0%, 90%, 100%': { opacity: '0' },
                '92%, 96%': { opacity: '0.6' },
                '94%': { opacity: '0' }
              },
              liquidWobble: {
                '0%, 100%': { transform: 'rotate(0deg)' },
                '25%': { transform: 'rotate(-1.5deg)' },
                '75%': { transform: 'rotate(1.5deg)' }
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* Global Reset */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      /* Disable selection globally for app-like feel */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior-y: none;
      }

      /* Re-enable selection for inputs */
      input, textarea, [contenteditable="true"] {
        -webkit-user-select: text;
        user-select: text;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
        transition: background-color 0.5s ease, color 0.5s ease;
        padding-bottom: env(safe-area-inset-bottom);
        /* Hardware Acceleration Hint */
        transform: translateZ(0); 
        will-change: background-color;
      }
      
      header.sticky {
        top: 0;
      }
      
      nav.fixed.bottom-0 {
        padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
      }

      .dark body {
        background-color: #111827;
        color: #f3f4f6;
      }
      
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #475569;
      }

      .page-transition-wrapper {
        animation: slideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        width: 100%;
        will-change: transform, opacity;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",

  }
}
</script>
</head>
  <body class="transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
