    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              dark: {
                bg: '#111827',
                card: '#1f2937',
                text: '#f3f4f6',
                muted: '#9ca3af'
              }
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'slide-in': 'slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up': 'slideUp 0.3s ease-out forwards',
              'fade-in': 'fadeIn 0.4s ease-out forwards',
              'gradient-x': 'gradientX 20s ease infinite',
              'blob': 'blob 7s infinite',
              'rain': 'fall linear infinite',
              'cloud': 'drift ease-in-out infinite alternate',
              'thunder': 'flash 5s infinite',
              'wobble': 'liquidWobble 0.25s ease-in-out infinite'
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              slideIn: {
                '0%': { opacity: '0', transform: 'translateY(10px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              gradientX: {
                '0%': { 'background-position': '0% 50%' },
                '50%': { 'background-position': '100% 50%' },
                '100%': { 'background-position': '0% 50%' },
              },
              blob: {
                '0%': { transform: 'translate3d(0px, 0px, 0) scale(1)' },
                '33%': { transform: 'translate3d(30px, -50px, 0) scale(1.1)' },
                '66%': { transform: 'translate3d(-20px, 20px, 0) scale(0.9)' },
                '100%': { transform: 'translate3d(0px, 0px, 0) scale(1)' },
              },
              fall: {
                '0%': { transform: 'translate3d(0, -10vh, 0) translateX(0)', opacity: '0' },
                '10%': { opacity: '1' },
                '90%': { opacity: '1' },
                '100%': { transform: 'translate3d(10px, 110vh, 0)', opacity: '0' }
              },
              drift: {
                '0%': { transform: 'translate3d(-5%, 0, 0)' },
                '50%': { transform: 'translate3d(5%, 0, 0)' },
                '100%': { transform: 'translate3d(-5%, 0, 0)' }
              },
              flash: {
                '0%, 90%, 100%': { opacity: '0' },
                '92%, 96%': { opacity: '0.6' },
                '94%': { opacity: '0' }
              },
              liquidWobble: {
                '0%, 100%': { transform: 'scale(1) rotate(0deg)' },
                '25%': { transform: 'scale(1.05) rotate(-1deg)' },
                '75%': { transform: 'scale(1.05) rotate(1deg)' }
              },
              'easter-fall': {
                '0%': { transform: 'translateY(-10vh) rotate(0deg)', opacity: '0' },
                '10%': { opacity: '1' },
                '90%': { opacity: '1' },
                '100%': { transform: 'translateY(110vh) rotate(360deg)', opacity: '0' }
              }
            }
          }
        }
      }
    </script>

      /* Global Reset */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      /* Liquid Glass Refinements */
      .liquid-shimmer-card {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);

        background: linear-gradient(135deg, rgba(59, 130, 246, 0.4), rgba(37, 99, 235, 0.2));
        border-radius: 20px;
        z-index: 0;

        will-change: left, width, transform;
        transition: width 0.3s ease, left 0.35s ease, transform 0.15s ease;

      .dark .nav-wobble-bubble {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.5), rgba(139, 92, 246, 0.3));
      }

      html, body {
